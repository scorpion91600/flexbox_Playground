<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Academy 🎯</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6c63ff;
            --secondary: #ff6584;
            --accent: #43e97b;
            --dark: #1a1a2e;
            --darker: #16213e;
            --card: #0f3460;
            --text: #e0e0e0;
            --text-muted: #a0a0b0;
            --success: #43e97b;
            --warning: #f8b500;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, var(--darker) 0%, var(--card) 100%);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 20px rgba(108, 99, 255, 0.3);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .level-badge {
            background: var(--primary);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .progress-bar-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .progress-track {
            width: 200px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ===== MAIN LAYOUT ===== */
        .app-container {
            display: flex;
            flex: 1;
            gap: 0;
            height: calc(100vh - 80px);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 320px;
            background: var(--darker);
            border-right: 1px solid rgba(108, 99, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .lesson-list {
            padding: 20px;
        }

        .lesson-list h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .lesson-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 5px;
            border: 1px solid transparent;
        }

        .lesson-item:hover {
            background: rgba(108, 99, 255, 0.1);
            border-color: rgba(108, 99, 255, 0.3);
        }

        .lesson-item.active {
            background: rgba(108, 99, 255, 0.2);
            border-color: var(--primary);
        }

        .lesson-item.completed {
            opacity: 0.7;
        }

        .lesson-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .lesson-item.active .lesson-num {
            background: var(--primary);
            border-color: var(--primary);
        }

        .lesson-item.completed .lesson-num {
            background: var(--success);
            border-color: var(--success);
            color: var(--dark);
        }

        .lesson-info {
            flex: 1;
        }

        .lesson-title {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .lesson-prop {
            font-size: 0.75rem;
            color: var(--primary);
            font-family: monospace;
            margin-top: 2px;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== INSTRUCTION PANEL ===== */
        .instruction-panel {
            background: var(--card);
            padding: 25px 35px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .instruction-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .instruction-icon {
            font-size: 2rem;
        }

        .instruction-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
        }

        .instruction-subtitle {
            font-size: 0.85rem;
            color: var(--primary);
            font-family: monospace;
            margin-top: 2px;
        }

        .instruction-text {
            line-height: 1.7;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .code-highlight {
            background: rgba(108, 99, 255, 0.2);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }

        /* ===== PLAYGROUND ===== */
        .playground {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .playground-split {
            flex: 1;
            display: flex;
            gap: 0;
            overflow: hidden;
        }

        /* ===== VISUALIZER ===== */
        .visualizer-section {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--dark);
            overflow-y: auto;
        }

        .visualizer-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .flex-container {
            background: rgba(108, 99, 255, 0.08);
            border: 2px dashed rgba(108, 99, 255, 0.4);
            border-radius: 16px;
            padding: 25px;
            min-height: 200px;
            display: flex;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .flex-container::before {
            content: 'container flex';
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--primary);
            color: white;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 10px;
            font-family: monospace;
        }

        /* ===== CIRCLES ===== */
        .flex-item {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            flex-shrink: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            position: relative;
            cursor: pointer;
        }

        .flex-item::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .flex-item:hover::after {
            border-color: white;
        }

        .item-1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .item-2 {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .item-3 {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .item-4 {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
        }

        .item-5 {
            background: linear-gradient(135deg, #f6d365, #fda085);
        }

        /* ===== CODE EDITOR ===== */
        .code-section {
            width: 340px;
            background: #0d1117;
            border-left: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .code-header {
            padding: 15px 20px;
            background: #161b22;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .code-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red { background: #ff5f57; }
        .dot-yellow { background: #febc2e; }
        .dot-green { background: #28c840; }

        .code-title {
            margin-left: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        .code-editor {
            flex: 1;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.8;
            overflow-y: auto;
        }

        .code-line {
            display: flex;
            gap: 10px;
        }

        .line-num {
            color: #444;
            user-select: none;
            min-width: 20px;
            text-align: right;
        }

        .code-selector { color: #7ee787; }
        .code-brace { color: #e6edf3; }
        .code-property { color: #79c0ff; }
        .code-colon { color: #e6edf3; }
        .code-value { color: #ff7b72; }
        .code-value.highlight {
            color: var(--accent);
            font-weight: 700;
            text-shadow: 0 0 10px var(--accent);
        }
        .code-semi { color: #e6edf3; }
        .code-comment { color: #8b949e; font-style: italic; }

        /* ===== OPTIONS PANEL ===== */
        .options-panel {
            background: var(--card);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .option-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .option-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .option-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-size: 0.8rem;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: rgba(108, 99, 255, 0.15);
        }

        .option-btn.selected {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* ===== BOTTOM BUTTONS ===== */
        .bottom-nav {
            background: var(--darker);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .btn {
            padding: 12px 28px;
            border-radius: 10px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8b83ff);
            color: white;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #38f9d7);
            color: var(--dark);
        }

        .btn-reset {
            background: rgba(255, 101, 132, 0.15);
            color: var(--secondary);
            border: 1px solid rgba(255, 101, 132, 0.3);
        }

        /* ===== SUCCESS TOAST ===== */
        .toast {
            position: fixed;
            top: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--success), #38f9d7);
            color: var(--dark);
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            transform: translateX(200%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 30px rgba(67, 233, 123, 0.4);
        }

        .toast.show {
            transform: translateX(0);
        }

        /* ===== PROPERTY TAGS ===== */
        .property-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .property-tag {
            background: rgba(108, 99, 255, 0.1);
            border: 1px solid rgba(108, 99, 255, 0.3);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: monospace;
        }

        /* ===== TOOLTIP ===== */
        .tooltip-box {
            background: rgba(255, 245, 157, 0.1);
            border: 1px solid rgba(255, 245, 157, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: #fff9c4;
            margin-top: 12px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .flex-item.animate-pulse::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: inherit;
            animation: pulse-ring 1s ease-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .flex-item {
            animation: float 3s ease-in-out infinite;
        }

        .flex-item:nth-child(2) { animation-delay: 0.5s; }
        .flex-item:nth-child(3) { animation-delay: 1s; }
        .flex-item:nth-child(4) { animation-delay: 1.5s; }
        .flex-item:nth-child(5) { animation-delay: 2s; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(108, 99, 255, 0.4);
            border-radius: 3px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .sidebar {
                display: none;
            }

            .code-section {
                width: 280px;
            }
        }

        @media (max-width: 600px) {
            .playground-split {
                flex-direction: column;
            }

            .code-section {
                width: 100%;
                height: 200px;
            }
        }
    </style>
</head>
<body>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <span>🎉</span>
        <span id="toast-msg">Parfait ! Bien joué !</span>
    </div>

    <!-- HEADER -->
    <header>
        <div class="logo">⚡ Flexbox Academy</div>
        <div class="progress-bar-container">
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <span class="progress-text" id="progress-text">0 / 8 leçons</span>
        </div>
        <div class="level-badge" id="level-badge">Leçon 1</div>
    </header>

    <!-- APP -->
    <div class="app-container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="lesson-list">
                <h3>📚 Programme</h3>
                <div id="lesson-list-container"></div>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="main-content">

            <!-- INSTRUCTION -->
            <div class="instruction-panel">
                <div class="instruction-header">
                    <span class="instruction-icon" id="lesson-icon">🎯</span>
                    <div>
                        <div class="instruction-title" id="lesson-title">Titre</div>
                        <div class="instruction-subtitle" id="lesson-subtitle">property: value</div>
                    </div>
                </div>
                <p class="instruction-text" id="lesson-text">Description</p>
                <div class="property-tags" id="property-tags"></div>
                <div class="tooltip-box" id="tooltip-box">
                    <span>💡</span>
                    <span id="tooltip-text">Astuce</span>
                </div>
            </div>

            <!-- PLAYGROUND -->
            <div class="playground">
                <div class="playground-split">

                    <!-- VISUALIZER -->
                    <div class="visualizer-section">
                        <div>
                            <div class="visualizer-label">🎨 Aperçu en direct</div>
                        </div>

                        <!-- TARGET -->
                        <div>
                            <div class="visualizer-label" style="color: #43e97b">✅ Objectif à atteindre</div>
                            <div class="flex-container" id="target-container" style="opacity: 0.6; border-color: rgba(67,233,123,0.4)">
                                <div class="flex-item item-1">A</div>
                                <div class="flex-item item-2">B</div>
                                <div class="flex-item item-3">C</div>
                            </div>
                        </div>

                        <!-- LIVE -->
                        <div>
                            <div class="visualizer-label" style="color: #6c63ff">🔵 Votre résultat</div>
                            <div class="flex-container" id="live-container">
                                <div class="flex-item item-1">A</div>
                                <div class="flex-item item-2">B</div>
                                <div class="flex-item item-3">C</div>
                            </div>
                        </div>

                        <!-- OPTIONS -->
                        <div class="options-panel" id="options-panel">
                            <span class="option-label" id="option-label">Choisir :</span>
                            <div class="option-buttons" id="option-buttons"></div>
                        </div>
                    </div>

                    <!-- CODE -->
                    <div class="code-section">
                        <div class="code-header">
                            <div class="code-dot dot-red"></div>
                            <div class="code-dot dot-yellow"></div>
                            <div class="code-dot dot-green"></div>
                            <span class="code-title">style.css</span>
                        </div>
                        <div class="code-editor" id="code-editor">
                        </div>
                    </div>

                </div>

                <!-- BOTTOM NAV -->
                <div class="bottom-nav">
                    <button class="btn btn-secondary" id="btn-prev" onclick="prevLesson()">
                        ← Précédent
                    </button>
                    <div style="display:flex; gap:10px;">
                        <button class="btn btn-reset" onclick="resetLesson()">
                            🔄 Reset
                        </button>
                        <button class="btn btn-primary" id="btn-validate" onclick="validateAnswer()">
                            Valider ✓
                        </button>
                    </div>
                    <button class="btn btn-primary" id="btn-next" onclick="nextLesson()">
                        Suivant →
                    </button>
                </div>
            </div>
        </div>
    </div>

<script>
// ===================================================
// DATA - LEÇONS FLEXBOX
// ===================================================
const lessons = [
    {
        id: 1,
        icon: "🎯",

        tooltip: "L'axe principal de flex est horizontal quand flex-direction est row (par défaut).",
        tags: ["justify-content", "axe principal", "flex-start"],

        correctValue: "flex-start",

        targetCSS: { justifyContent: "flex-start" },
        codeBase: [
            { type: "selector", val: ".container" },
            { type: "prop", key: "display", val: "flex" },
            { type: "prop", key: "justify-content", val: "flex-start", highlight: true },

    },
    {
        id: 2,

        tooltip: "Attention : les éléments restent dans le même ordre, seule leur position change !",
        tags: ["justify-content", "axe principal", "flex-end"],
        items: 3,
        correctValue: "flex-end",
        options: ["flex-start", "flex-end", "center", "space-between", "space-around"],
        targetCSS: { justifyContent: "flex-end" },
        codeBase: [
            { type: "selector", val: ".container" },
            { type: "prop", key: "display", val: "flex" },
            { type: "prop", key: "justify-content", val: "flex-end", highlight: true },
        ]
    },
    {
        id: 3,
        icon: "⚖️",
        title: "justify-content : center",
        subtitle: "justify-content: center",
        prop: "justify-content",
        text: `La valeur <code>center</code> centre les éléments au <strong>milieu</strong> du conteneur sur l'axe principal.

        tooltip: "Centrer verticalement utilise align-items: center — on verra ça bientôt !",
        tags: ["justify-content", "centrage", "center"],
        items: 3,
        correctValue: "center",
        options: ["flex-start", "flex-end", "center", "space-between", "space-around"],
        targetCSS: { justifyContent: "center" },
        codeBase: [
            { type: "selector", val: ".container" },
            { type: "prop", key: "display", val: "flex" },
            { type: "prop", key: "justify-content", val: "center", highlight: true },
        ]
    },
    {
        id: 4,
        icon: "↔️",
        title: "justify-content : space-between",
        subtitle: "justify-content: space-between",
        prop: "justify-content",
        text: `<code>space-between</code> répartit les éléments avec un <strong>espace égal entre eux</strong>.

        tooltip: "Idéal pour créer des barres de navigation avec le logo à gauche et les liens à droite !",
        tags: ["justify-content", "espace", "space-between"],
        items: 4,
        correctValue: "space-between",
        options: ["flex-start", "center", "space-between", "space-around", "space-evenly"],

// ===================================================
// STATE
// ===================================================
let currentLesson = 0;
let selectedValue = "";
let completed = [];

// ===================================================
// INIT
// ===================================================
function init() {
    renderSidebar();
    loadLesson(0);
}

// ===================================================
// SIDEBAR
// ===================================================
function renderSidebar() {
    const container = document.getElementById('lesson-list-container');
    container.innerHTML = '';
    lessons.forEach((lesson, index) => {
        const div = document.createElement('div');
        div.className = `lesson-item ${index === currentLesson ? 'active' : ''} ${completed.includes(index) ? 'completed' : ''}`;
        div.onclick = () => loadLesson(index);
        div.innerHTML = `
            <div class="lesson-num">${completed.includes(index) ? '✓' : index + 1}</div>
            <div class="lesson-info">
                <div class="lesson-title">${lesson.title.split(':')[0]}</div>
                <div class="lesson-prop">${lesson.subtitle}</div>
            </div>
        `;
        container.appendChild(div);
    });
}

// ===================================================
// LOAD LESSON
// ===================================================
function loadLesson(index) {
    currentLesson = index;
    const lesson = lessons[index];
    selectedValue = "";

    // Header
    document.getElementById('lesson-icon').textContent = lesson.icon;
    document.getElementById('lesson-title').textContent = lesson.title;
    document.getElementById('lesson-subtitle').textContent = lesson.subtitle;
    document.getElementById('lesson-text').innerHTML = lesson.text;
    document.getElementById('tooltip-text').textContent = lesson.tooltip;
    document.getElementById('level-badge').textContent = `Leçon ${index + 1}`;

    // Tags
    const tagsEl = document.getElementById('property-tags');
    tagsEl.innerHTML = lesson.tags.map(t => `<span class="property-tag">${t}</span>`).join('');

    // Progress
    const pct = Math.round((completed.length / lessons.length) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `${completed.length} / ${lessons.length} leçons`;

    // Containers
    renderContainers(lesson);

    // Options
    renderOptions(lesson);

    // Code
    renderCode(lesson, null);

    // Buttons
    document.getElementById('btn-prev').disabled = index === 0;
    document.getElementById('btn-next').disabled = index === lessons.length - 1;

    // Sidebar
    renderSidebar();
}

// ===================================================
// RENDER CONTAINERS
// ===================================================
function renderContainers(lesson) {
    const items = createItems(lesson.items || 3);

    // TARGET
    const target = document.getElementById('target-container');
    target.innerHTML = items;
    Object.assign(target.style, {
        justifyContent: '',
        alignItems: '',
        flexDirection: '',
        minHeight: ''
    });
    Object.assign(target.style, lesson.targetCSS);

    // LIVE
    const live = document.getElementById('live-container');
    live.innerHTML = items;
    Object.assign(live.style, {
        justifyContent: '',
        alignItems: '',
        flexDirection: '',
        minHeight: lesson.containerHeight || '150px'
    });
}

function createItems(count) {
    let html = '';
    const labels = ['A','B','C','D','E'];
    for(let i = 0; i < count; i++) {
        html += `<div class="flex-item item-${i+1}">${labels[i]}</div>`;
    }
    return html;
}

// ===================================================
// RENDER OPTIONS
// ===================================================
function renderOptions(lesson) {
    const label = document.getElementById('option-label');
    const buttons = document.getElementById('option-buttons');

    label.textContent = `${lesson.prop} :`;
    buttons.innerHTML = '';

    lesson.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => selectOption(opt, lesson);
        buttons.appendChild(btn);
    });
}

// ===================================================
// SELECT OPTION
// ===================================================
function selectOption(value, lesson) {
    selectedValue = value;

    // Update button states
    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.classList.toggle('selected', btn.textContent === value);
    });

    // Update live container
    const live = document.getElementById('live-container');
    const cssProp = lesson.prop === 'justify-content' ? 'justifyContent' :
                    lesson.prop === 'align-items' ? 'alignItems' :
                    lesson.prop === 'flex-direction' ? 'flexDirection' : lesson.prop;
    live.style[cssProp] = value;

    // Update code
    renderCode(lesson, value);
}

// ===================================================
// RENDER CODE
// ===================================================
function renderCode(lesson, currentValue) {
    const editor = document.getElementById('code-editor');
    let lineNum = 1;
    let html = '';

    html += codeLine(lineNum++, `<span class="code-selector">.container</span> <span class="code-brace">{</span>`);

    lesson.codeBase.forEach(item => {
        if(item.type === 'selector') return;
        const isHighlight = item.highlight;
        const displayVal = (isHighlight && currentValue) ? currentValue : item.val;
        html += codeLine(lineNum++,
            `&nbsp;&nbsp;<span class="code-property">${item.key}</span><span class="code-colon">:</span> <span class="code-value ${isHighlight ? 'highlight' : ''}">${displayVal}</span><span class="code-semi">;</span>`
        );
    });

    html += codeLine(lineNum++, `<span class="code-brace">}</span>`);
    html += codeLine(lineNum++, ``);

    // Items CSS
    html += codeLine(lineNum++, `<span class="code-comment">/* Éléments enfants */</span>`);
    html += codeLine(lineNum++, `<span class="code-selector">.item</span> <span class="code-brace">{</span>`);
    html += codeLine(lineNum++, `&nbsp;&nbsp;<span class="code-property">width</span><span class="code-colon">:</span> <span class="code-value">70px</span><span class="code-semi">;</span>`);
    html += codeLine(lineNum++, `&nbsp;&nbsp;<span class="code-property">height</span><span class="code-colon">:</span> <span class="code-value">70px</span><span class="code-semi">;</span>`);
    html += codeLine(lineNum++, `&nbsp;&nbsp;<span class="code-property">border-radius</span><span class="code-colon">:</span> <span class="code-value">50%</span><span class="code-semi">;</span>`);
    html += codeLine(lineNum++, `<span class="code-brace">}</span>`);

    editor.innerHTML = html;
}

function codeLine(num, content) {
    return `<div class="code-line"><span class="line-num">${num}</span><span>${content}</span></div>`;
}

// ===================================================
// VALIDATE
// ===================================================
function validateAnswer() {
    const lesson = lessons[currentLesson];

    if(!selectedValue) {
        showToast("❓ Sélectionne une valeur d'abord !", false);
        return;
    }

    if(selectedValue === lesson.correctValue) {
        if(!completed.includes(currentLesson)) {
            completed.push(currentLesson);
        }
        showToast("🎉 Excellent ! C'est la bonne réponse !", true);
        renderSidebar();

        // Update progress
        const pct = Math.round((completed.length / lessons.length) * 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('progress-text').textContent = `${completed.length} / ${lessons.length} leçons`;

        // Auto next after delay
        setTimeout(() => {
            if(currentLesson < lessons.length - 1) {
                nextLesson();
            }
        }, 2000);
    } else {
        showToast("❌ Pas tout à fait... Essaie encore !", false);
    }
}

// ===================================================
// NAVIGATION
// ===================================================
function nextLesson() {
    if(currentLesson < lessons.length - 1) {
        loadLesson(currentLesson + 1);
    }
}

function prevLesson() {
    if(currentLesson > 0) {
        loadLesson(currentLesson - 1);
    }
}

function resetLesson() {
    selectedValue = "";
    const lesson = lessons[currentLesson];
    const live = document.getElementById('live-container');
    live.style.justifyContent = '';
    live.style.alignItems = '';
    live.style.flexDirection = '';
    document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
    renderCode(lesson, null);
    showToast("🔄 Remis à zéro !", false);
}

// ===================================================
// TOAST
// ===================================================
function showToast(msg, success) {
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toast-msg');

    toast.style.background = success
        ? 'linear-gradient(135deg, #43e97b, #38f9d7)'
        : 'linear-gradient(135deg, #ff6584, #ff4757)';
    toast.style.color = success ? '#1a1a2e' : 'white';
    toastMsg.textContent = msg;

    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===================================================
// START
// ===================================================
init();
</script>
